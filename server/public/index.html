<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LamportsFactory Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-actions">
        <button type="button" class="sidebar-action-button" id="refresh-button" title="Refresh" aria-label="Refresh">↻</button>
        <div class="layout-toggle" id="layout-toggle" hidden>
          <button type="button" class="sidebar-action-button" data-layout-mode="preview" title="Preview" aria-label="Preview">▣</button>
          <button type="button" class="sidebar-action-button" data-layout-mode="split" title="Split" aria-label="Split">◫</button>
        </div>
      </div>
      <h1>Workspace</h1>
      <div class="tex-list-container">
        <ul id="tex-list" class="tex-list"></ul>
      </div>
    </aside>
    <main class="main-area">
      <section class="viewer">
        <iframe id="pdf-frame" src="/pdf" title="LaTeX preview"></iframe>
      </section>
      <section class="terminal-pane" id="terminal-pane" hidden>
        <iframe id="terminal-frame" title="Terminal"></iframe>
      </section>
    </main>
  </div>
  <script src="/static/client.js" defer></script>
</body>
</html>
