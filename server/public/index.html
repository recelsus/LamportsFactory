<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LamportsFactory Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-actions">
        <button type="button" class="sidebar-action-button" id="refresh-button" title="Refresh" aria-label="Refresh">↻</button>
        <div class="layout-toggle" id="layout-toggle" hidden>
          <button type="button" class="sidebar-action-button" data-layout-mode="preview" title="Preview" aria-label="Preview">▣</button>
          <button type="button" class="sidebar-action-button" data-layout-mode="split" title="Split" aria-label="Split">◫</button>
        </div>
      </div>
      <h1>Workspace</h1>
      <div class="document-list-container">
        <ul id="document-list" class="document-list"></ul>
      </div>
    </aside>
    <main class="main-area">
      <section class="viewer">
        <div class="pdf-toolbar" id="pdf-toolbar" aria-label="PDF tools">
          <button type="button" class="pdf-tool-button" data-pdf-action="previous_page" title="Previous page" aria-label="Previous page">‹</button>
          <span class="pdf-tool-label" id="pdf-page-label">0/0</span>
          <button type="button" class="pdf-tool-button" data-pdf-action="next_page" title="Next page" aria-label="Next page">›</button>
          <button type="button" class="pdf-tool-button" data-pdf-action="zoom_out" title="Zoom out" aria-label="Zoom out">−</button>
          <span class="pdf-tool-label" id="pdf-zoom-label">100%</span>
          <button type="button" class="pdf-tool-button" data-pdf-action="zoom_in" title="Zoom in" aria-label="Zoom in">+</button>
          <button type="button" class="pdf-tool-button" data-pdf-action="rotate" title="Rotate" aria-label="Rotate">↻</button>
          <button type="button" class="pdf-tool-button" data-pdf-action="download" title="Download" aria-label="Download">↓</button>
        </div>
        <div class="pdf-canvas-scroll">
          <canvas id="pdf-canvas"></canvas>
        </div>
      </section>
      <section class="terminal-pane" id="terminal-pane" hidden>
        <iframe id="terminal-frame" title="Terminal"></iframe>
      </section>
    </main>
  </div>
  <script type="module" src="/static/client.js"></script>
</body>
</html>
