services:
  lamports-factory:
    image: ghcr.io/recelsus/lamportsfactory:latex-latest
    container_name: lamports-factory
    environment:
      # path only. examples: / | /lamports-factory
      BASE_URL: /
      WORKSPACE_DIR: /app/workspace
      BUILD_DIR_NAME: build
      # .tex | .typ
      DOCUMENT_EXTENSION: .tex
      # latex | typst
      COMPILER_BACKEND: latex
      # typst examples:
      # MAIN_DOCUMENT: sample/main.typ
      # DOCUMENT_EXTENSION: .typ
      # TYPST_OPTS: "--root . --font-path /app/fonts"
      # optional:
      # MAIN_DOCUMENT: sample/main.tex
      # latexmk | tectonic
      LATEX_BUILD_TOOL: latexmk
      # lualatex | xelatex | pdflatex | platex | uplatex
      LATEX_ENGINE: lualatex
      # Override latexmk options directly when needed.
      # LATEXMK_OPTS: "-lualatex -interaction=nonstopmode"
      # sse | poll | ws
      RELOAD_MODE: sse
      # preview | split
      # If TTYD_ENABLED is disable, split falls back to preview.
      LAYOUT_MODE: split
      # optional:
      # NVIM_CONFIG_REPO: "https://github.com/yourname/nvim.git"
      # enable | disable
      # NVIM_BOOTSTRAP_ON_INIT: enable
      # enable | disable
      TTYD_ENABLED: enable
      # tmux session name used behind ttyd
      # TTYD_TMUX_SESSION: lamportsfactory-main
      # ttyd font examples:
      # TTYD_FONT_FAMILY: "JetBrainsMono Nerd Font, Symbols Nerd Font Mono, monospace"
    volumes:
      - ./workspace:/app/workspace
      - ./volumes/texmf:/app/texmf
      - ./volumes/fonts:/app/fonts
      - ./volumes/nvim:/app/nvim
    ports:
      - "8080:8080"
    restart: unless-stopped
