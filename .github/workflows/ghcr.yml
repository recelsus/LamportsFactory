name: GHCR

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            ninja-build

      - name: Configure CMake
        run: cmake -S server -B build/server -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build unit tests
        run: cmake --build build/server --target lf_unit_tests

      - name: Run unit tests
        run: ctest --test-dir build/server --output-on-failure

      - name: Build server
        run: cmake --build build/server --target lf

      - name: Check frontend modules
        run: |
          node --input-type=module --check < server/public/client.js
          for file in server/public/app/*.js server/public/pdf/*.js; do
            node --input-type=module --check < "$file"
          done

      - name: Validate compose files
        run: |
          docker compose -f docker/docker-compose.yml config
          docker compose -f docker/build.latex.yml config
          docker compose -f docker/build.typst.yml config

  publish:
    name: Publish ${{ matrix.backend }}
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        backend:
          - latex
          - typst
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        id: meta
        shell: bash
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          backend="${{ matrix.backend }}"
          short_sha="${GITHUB_SHA::12}"
          tags="${image}:${backend}-${short_sha}"

          if [ "${GITHUB_REF_TYPE}" = "branch" ] && [ "${GITHUB_REF_NAME}" = "master" ]; then
            tags="${tags}"$'\n'"${image}:${backend}-latest"
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            tags="${tags}"$'\n'"${image}:${backend}-${version}"
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: runtime
          push: true
          build-args: |
            DOCUMENT_BACKEND=${{ matrix.backend }}
          tags: ${{ steps.meta.outputs.tags }}
